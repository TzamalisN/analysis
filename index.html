<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NA Investment Research</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;font-family:'Sora',sans-serif;min-height:100vh}
input,button{font-family:'Sora',sans-serif;outline:none}
button{cursor:pointer;transition:transform 0.1s}
button:active:not(:disabled){transform:scale(0.97)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;border-bottom:2px solid rgba(201,169,74,0.4);color:#c9a94a;text-align:left;font-family:monospace;font-weight:700;white-space:nowrap;font-size:12px}
td{padding:8px 12px;border-bottom:1px solid rgba(201,169,74,0.07);font-family:monospace;font-size:12.5px}
@media print{
  .no-print{display:none!important}
  body{background:white!important}
  .sc{background:white!important;border:1px solid #ddd!important;break-inside:avoid;margin-bottom:8px!important}
  .hero{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  p,td{color:#222!important}strong{color:#000!important}th{color:#0a1628!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SYSTEM_PROMPT=`You are a senior equity research analyst trained in Warren Buffett and Charlie Munger's value investing philosophy. You have extensive knowledge of publicly listed companies from SEC filings, annual reports, and financial databases up to early 2025.

For the requested company, use your knowledge to produce a complete institutional-grade analysis. Use real numbers you know. If unsure about a specific figure, write N/A.

Write using EXACTLY these ## section headers:

## BUSINESS OVERVIEW
2-3 paragraphs: what the company does, market position, key revenue drivers.

## ECONOMIC MOAT ANALYSIS
Evaluate: Cost Advantage, Network Effects, Switching Costs, Intangible Assets, Efficient Scale.
**Overall Moat Rating:** [None / Narrow / Wide]
**Moat Durability:** [Weakening / Stable / Strengthening]

## MANAGEMENT & CAPITAL ALLOCATION
ROIC trend, buybacks, dividends, M&A, debt management.
**Management Quality:** [Poor / Below Average / Average / Good / Excellent]

## FINANCIAL FORTRESS ANALYSIS
| Metric | 2022 | 2023 | 2024 | Trend |
Rows: Revenue ($B), Net Income ($B), EBITDA ($B), Free Cash Flow ($B), Total Debt ($B), Cash ($B), Debt/EBITDA, Interest Coverage, Current Ratio.
**Balance Sheet Grade:** [Weak / Adequate / Strong / Fortress]

## PROFITABILITY & RETURNS
5-year data: ROIC, ROE, Net Margin, FCF Margin, Revenue CAGR.

## VALUATION
Current metrics: P/E, EV/EBITDA, P/FCF, P/Book, Dividend Yield.
- Bear Case: $X
- Base Case: $X
- Bull Case: $X
**Margin of Safety:** [X%] — [Overvalued / Fair / Undervalued / Significantly Undervalued]

## RISK FACTORS
5 risks: **[Name]** (Severity: Low/Medium/High) — one sentence.

## NA PROPRIETARY CREDIT RATING
| Category | Max Pts | Awarded | Rationale |
|---|---|---|---|
| Debt/EBITDA | 10 | X | ... |
| Interest Coverage | 10 | X | ... |
| Current Ratio | 10 | X | ... |
| FCF/Debt | 10 | X | ... |
| ROIC | 10 | X | ... |
| Net Margin | 10 | X | ... |
| FCF Margin | 10 | X | ... |
| Revenue CAGR | 7 | X | ... |
| Earnings Consistency | 7 | X | ... |
| Moat | 6 | X | ... |
| FCF Yield | 10 | X | ... |
| **TOTAL** | **100** | **XX** | |

Scoring: Debt/EBITDA <1.5x=10,1.5-2.5x=7,2.5-4x=4,>4x=0. Interest Coverage >10x=10,5-10x=7,2-5x=4,<2x=0. Current Ratio >2=10,1.5-2=7,1-1.5=4,<1=0. FCF/Debt >30%=10,15-30%=7,5-15%=4,<5%=0. ROIC >20%=10,12-20%=7,6-12%=4,<6%=0. Net Margin >20%=10,10-20%=7,4-10%=4,<4%=0. FCF Margin >15%=10,8-15%=7,2-8%=4,<2%=0. Revenue CAGR >10%=7,5-10%=5,0-5%=3,<0=0. Consistency 5/5=7,4/5=5,3/5=3,<3=0. Moat Wide=6,Narrow=3,None=0. FCF Yield >8%=10,4-8%=7,2-4%=4,<2%=0.

**Total Score: XX / 100**
**NA Credit Rating:** [AAA/AA+/AA/A+/A/BBB+/BBB/BB/B/CCC]
90-100=AAA,80-89=AA+,70-79=AA,60-69=A+,50-59=A,40-49=BBB+,30-39=BBB,20-29=BB,10-19=B,0-9=CCC
**Rating Outlook:** [Negative / Stable / Positive]

## INVESTMENT VERDICT
**Recommendation:** [Strong Buy / Buy / Hold / Sell / Strong Sell]
**Investment Horizon:** [Short-term <1yr / Medium-term 1-3yr / Long-term 3yr+]
**Suitable For:** [Income / Growth / Value / Speculative]
One direct paragraph. Would Buffett buy this?`;

function getRatingColor(r){if(!r)return"#888";if(r.startsWith("AAA")||r.startsWith("AA"))return"#22c55e";if(r.startsWith("A"))return"#86efac";if(r.startsWith("BBB"))return"#facc15";if(r.startsWith("BB"))return"#fb923c";return"#ef4444";}
function getVerdictColor(v){if(!v)return"#888";if(v.includes("Strong Buy"))return"#22c55e";if(v.includes("Buy"))return"#86efac";if(v.includes("Hold"))return"#facc15";return"#ef4444";}
function extractMeta(t){
  const rating=(t.match(/\*\*NA Credit Rating:\*\*\s*([A-Z+]+)/)||[])[1]||null;
  const sm=t.match(/\|\s*\*\*TOTAL\*\*[^|]*\|[^|]*\|\s*\*\*(\d+)\*\*/);
  const score=sm?sm[1]:(t.match(/Total Score:\s*(\d+)/)||[])[1]||null;
  const verdict=(t.match(/\*\*Recommendation:\*\*\s*([\w ]+)/)||[])[1]?.trim()||null;
  const moat=(t.match(/\*\*Overall Moat Rating:\*\*\s*([\w]+)/)||[])[1]||null;
  const outlook=(t.match(/\*\*Rating Outlook:\*\*\s*([\w]+)/)||[])[1]||null;
  return{rating,score,verdict,moat,outlook};
}
function parseReport(text){const s=[];let c=null;for(const l of text.split("\n")){if(l.startsWith("## ")){if(c)s.push(c);c={title:l.slice(3).trim(),content:[]};}else if(c)c.content.push(l);}if(c)s.push(c);return s;}
function renderContent(lines){
  const out=[];let tbl=[],inTbl=false;
  const flush=()=>{
    if(tbl.length<2){tbl=[];return;}
    const rows=tbl.map(l=>l.split("|").map(c=>c.trim()).filter(Boolean));
    const hdr=rows[0];const body=rows.slice(1).filter(r=>!r.every(c=>/^[-:]+$/.test(c)));
    out.push(`<div style="overflow-x:auto;margin:14px 0"><table><thead><tr>${hdr.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body.map((row,ri)=>`<tr style="background:${ri%2===0?"rgba(201,169,74,0.03)":"transparent"}">${row.map((cell,ci)=>`<td style="color:${ci===0?"#dde0ec":"#9daabf"}">${cell}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`);
    tbl=[];
  };
  for(const line of lines){
    if(line.startsWith("|")){inTbl=true;tbl.push(line);}
    else{if(inTbl){flush();inTbl=false;}
      if(!line.trim()){out.push(`<div style="height:7px"></div>`);}
      else{const ab=/^\*\*[^*]+\*\*$/.test(line.trim());const html=line.replace(/\*\*([^*]+)\*\*/g,(_,t)=>`<strong style="color:${ab?"#c9a94a":"#dde0ec"};font-weight:600">${t}</strong>`);out.push(`<p style="color:${ab?"#c9a94a":"#a8b8cc"};line-height:1.8;margin:2px 0;font-size:13.5px">${html}</p>`);}
    }
  }
  if(inTbl)flush();return out.join("");
}

const LS={A:"na_anth_key",H:"na_hist_v6"};
const S={
  ak:localStorage.getItem(LS.A)||"",
  hist:JSON.parse(localStorage.getItem(LS.H)||"[]"),
  ok:!!(localStorage.getItem(LS.A)),
  q:"",loading:false,si:0,report:null,cname:"",err:"",sa:false
};
const STS=["Ανάλυση εταιρίας...","Αξιολόγηση moat & financials...","Υπολογισμός credit rating...","Σύνταξη έκθεσης..."];
const TODAY=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});
let stTimer=null;

function render(){
  const meta=S.report?extractMeta(S.report):{};
  const secs=S.report?parseReport(S.report):[];
  document.getElementById("app").innerHTML=`
  <div style="min-height:100vh;background:#07090f;padding-bottom:80px">
    <div class="no-print" style="background:#0a1628;border-bottom:1px solid rgba(201,169,74,0.15);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:99">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,#c9a94a,#e8c86a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;color:#07090f;font-weight:bold">Ν</div>
        <div><div style="font-family:'DM Serif Display',serif;color:#f0e6c8;font-size:14px">NA Investment Research</div><div style="font-size:9px;color:#3a4a70;letter-spacing:0.08em;text-transform:uppercase">Buffett-Style Equity Analysis</div></div>
      </div>
      ${S.report?`<button onclick="window.print()" style="background:#c9a94a;color:#07090f;border:none;padding:7px 14px;border-radius:6px;font-weight:700;font-size:12px">⬇ PDF</button>`:""}
    </div>
    <div class="no-print" style="max-width:600px;margin:32px auto 0;padding:0 14px">
      <div style="background:rgba(12,20,36,0.95);border:1px solid rgba(201,169,74,0.2);border-radius:16px;padding:22px">
        <h1 style="font-family:'DM Serif Display',serif;color:#f0e6c8;font-size:21px;margin-bottom:4px">Equity Analysis</h1>
        <p style="color:#5060a0;font-size:13px;margin-bottom:18px;line-height:1.5">Γράψε το όνομα ή το ticker εισηγμένης εταιρίας.</p>
        ${!S.ok?`
        <div style="background:rgba(201,169,74,0.05);border:1px solid rgba(201,169,74,0.15);border-radius:10px;padding:16px">
          <div style="font-size:11px;color:#c9a94a;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:8px">Anthropic API Key — αποθηκεύεται μόνιμα</div>
          <p style="color:#5060a0;font-size:12px;margin-bottom:12px">Από το <a href="https://console.anthropic.com" target="_blank" style="color:#c9a94a">console.anthropic.com</a> → API Keys → Create Key</p>
          <div style="display:flex;gap:6px;margin-bottom:14px">
            <input id="ia" type="${S.sa?"text":"password"}" value="${S.ak}" placeholder="sk-ant-..." style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,169,74,0.25);border-radius:7px;padding:10px 12px;color:#e0e4f0;font-size:13px;font-family:monospace"/>
            <button onclick="toggleA()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#8090a8;border-radius:7px;padding:0 12px;font-size:14px">${S.sa?"🙈":"👁"}</button>
          </div>
          <button onclick="saveK()" style="width:100%;background:linear-gradient(135deg,#c9a94a,#e0b84a);color:#07090f;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:14px">Αποθήκευση & Συνέχεια →</button>
        </div>`:`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:8px 12px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:8px">
          <span style="color:#86efac;font-size:12px">✓ API Key αποθηκευμένο μόνιμα</span>
          <button onclick="resetK()" style="background:none;border:none;color:#4a5a70;font-size:11px;text-decoration:underline">Αλλαγή</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="iq" value="${S.q}" placeholder="π.χ. Apple, Coca-Cola, Metlen, LVMH, Visa..." ${S.loading?"disabled":""} style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,169,74,0.25);border-radius:9px;padding:13px 14px;color:#e0e4f0;font-size:15px"/>
          <button id="runbtn" onclick="doRun()" ${S.loading||!S.q.trim()?"disabled":""} style="background:${S.loading||!S.q.trim()?"#111a28":"linear-gradient(135deg,#c9a94a,#e0b84a)"};color:${S.loading||!S.q.trim()?"#2a3a4a":"#07090f"};border:none;padding:13px 18px;border-radius:9px;font-weight:700;font-size:14px;min-width:100px">${S.loading?"...":"Ανάλυση →"}</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${S.hist.length?"12px":"0"}">
          ${["Apple","Coca-Cola","Visa","Metlen","LVMH","Novo Nordisk"].map(n=>`<button onclick="qRun('${n}')" ${S.loading?"disabled":""} style="background:rgba(201,169,74,0.06);border:1px solid rgba(201,169,74,0.18);border-radius:6px;padding:5px 11px;color:#9a8040;font-size:12px;font-weight:500">${n}</button>`).join("")}
        </div>
        ${S.hist.length?`<div style="border-top:1px solid rgba(255,255,255,0.05);padding-top:10px"><div style="font-size:10px;color:#2a3a50;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px">Πρόσφατες</div><div style="display:flex;gap:5px;flex-wrap:wrap">${S.hist.map(h=>`<button onclick="qRun('${h}')" ${S.loading?"disabled":""} style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:4px 10px;color:#4a5a70;font-size:12px">↩ ${h}</button>`).join("")}</div></div>`:""}
        `}
      </div>
      ${S.loading?`<div style="margin-top:16px;display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(10,20,36,0.8);border:1px solid rgba(201,169,74,0.12);border-radius:10px"><div style="width:18px;height:18px;border:2px solid rgba(201,169,74,0.15);border-top-color:#c9a94a;border-radius:50%;flex-shrink:0;animation:spin 0.8s linear infinite"></div><div><div id="stxt" style="color:#c9a94a;font-size:13px;font-weight:500;animation:pulse 2s ease-in-out infinite">${STS[S.si]}</div><div style="color:#2a3a50;font-size:11px;margin-top:2px">~20-30 δευτερόλεπτα...</div></div></div>`:""}
      ${S.err?`<div style="margin-top:12px;padding:12px 14px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:9px;color:#fca5a5;font-size:13px;line-height:1.5">⚠ ${S.err}</div>`:""}
    </div>
    ${S.report?`
    <div style="max-width:860px;margin:24px auto 0;padding:0 14px;animation:fadeUp 0.4s ease">
      <div class="hero" style="background:linear-gradient(135deg,#0a1628,#0d1e38);border:1px solid rgba(201,169,74,0.22);border-radius:15px;padding:26px;margin-bottom:12px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(201,169,74,0.05),transparent 70%);pointer-events:none"></div>
        <div style="font-size:9px;color:#c9a94a;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:5px;font-weight:600">Equity Research · Confidential</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px">
          <div>
            <h2 style="font-family:'DM Serif Display',serif;color:#f0e6c8;font-size:26px;margin-bottom:6px">${S.cname}</h2>
            <div style="color:#3a4a60;font-size:11px">Issued: ${TODAY} · NA Investment Research</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${meta.rating?`<div style="background:rgba(7,9,15,0.85);border:2px solid ${getRatingColor(meta.rating)};border-radius:10px;padding:9px 14px;text-align:center;min-width:76px"><div style="font-size:9px;color:#3a4a60;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1px">NA Rating</div><div style="font-family:monospace;font-size:20px;font-weight:700;color:${getRatingColor(meta.rating)}">${meta.rating}</div>${meta.score?`<div style="font-size:9px;color:#2a3a4a">${meta.score}/100</div>`:""}</div>`:""}
            ${meta.verdict?`<div style="background:rgba(7,9,15,0.85);border:2px solid ${getVerdictColor(meta.verdict)};border-radius:10px;padding:9px 14px;text-align:center;min-width:88px"><div style="font-size:9px;color:#3a4a60;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1px">Verdict</div><div style="font-size:11px;font-weight:700;color:${getVerdictColor(meta.verdict)};line-height:1.3">${meta.verdict}</div></div>`:""}
            ${meta.moat?`<div style="background:rgba(7,9,15,0.85);border:2px solid rgba(201,169,74,0.28);border-radius:10px;padding:9px 14px;text-align:center;min-width:76px"><div style="font-size:9px;color:#3a4a60;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1px">Moat</div><div style="font-size:13px;font-weight:700;color:#c9a94a">${meta.moat}</div></div>`:""}
          </div>
        </div>
      </div>
      ${secs.map(sec=>`<div class="sc" style="background:rgba(10,16,28,0.75);border:1px solid rgba(201,169,74,0.08);border-radius:11px;padding:18px 20px;margin-bottom:9px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid rgba(201,169,74,0.08)"><div style="width:3px;height:14px;background:#c9a94a;border-radius:2px;flex-shrink:0"></div><h3 style="font-family:'DM Serif Display',serif;color:#c9a94a;font-size:14px">${sec.title}</h3></div>${renderContent(sec.content)}</div>`).join("")}
      <div style="padding:16px;text-align:center"><p style="font-size:10px;color:#1a2432;line-height:1.6;max-width:500px;margin:0 auto">For informational purposes only. Not investment advice. NA Credit Rating is proprietary and independent of Moody's, S&amp;P, or Fitch.</p></div>
    </div>`:""}
  </div>`;

  const iq=document.getElementById("iq");
  if(iq){iq.addEventListener("input",e=>{S.q=e.target.value;const b=document.getElementById("runbtn");if(b){const ok=!S.loading&&S.q.trim();b.disabled=!ok;b.style.background=ok?"linear-gradient(135deg,#c9a94a,#e0b84a)":"#111a28";b.style.color=ok?"#07090f":"#2a3a4a";}});iq.addEventListener("keydown",e=>{if(e.key==="Enter")doRun();});}
  const ia=document.getElementById("ia");if(ia)ia.addEventListener("input",e=>{S.ak=e.target.value;});
}

window.toggleA=()=>{S.sa=!S.sa;render();};
window.saveK=()=>{
  const a=document.getElementById("ia")?.value?.trim();
  if(!a){alert("Βάλε το API key.");return;}
  S.ak=a;localStorage.setItem(LS.A,a);S.ok=true;render();
};
window.resetK=()=>{S.ok=false;render();};
window.qRun=(n)=>{S.q=n;doRun(n);};
window.doRun=()=>runAnalysis(S.q);

async function runAnalysis(inputName){
  const name=(inputName||S.q||"").trim();
  if(!name||S.loading)return;
  if(!S.ak){S.err="Βάλε πρώτα το Anthropic API key.";render();return;}
  S.q=name;S.loading=true;S.err="";S.report=null;S.cname=name;S.si=0;
  render();
  clearInterval(stTimer);
  stTimer=setInterval(()=>{S.si=(S.si+1)%STS.length;const el=document.getElementById("stxt");if(el)el.textContent=STS[S.si];},6000);
  try{
    const aiRes=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":S.ak,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-5",max_tokens:4000,system:SYSTEM_PROMPT,messages:[{role:"user",content:`Produce a complete Buffett-style equity analysis for: "${name}". Use your training knowledge for real financial figures from SEC filings and annual reports.`}]})
    });
    if(!aiRes.ok){const e=await aiRes.json().catch(()=>({}));throw new Error(`API error ${aiRes.status}: ${e?.error?.message||"Unknown"}`);}
    const aiData=await aiRes.json();
    const text=aiData.content?.find(b=>b.type==="text")?.text||"";
    if(!text||!text.includes("##"))throw new Error("Μη έγκυρη απόκριση. Δοκίμασε ξανά.");
    const updated=[name,...S.hist.filter(h=>h!==name)].slice(0,6);
    S.hist=updated;localStorage.setItem(LS.H,JSON.stringify(updated));
    S.report=text;
  }catch(e){S.err=e.message||"Σφάλμα. Δοκίμασε ξανά.";}
  finally{clearInterval(stTimer);S.loading=false;render();}
}

render();
</script>
</body>
</html>
